<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Note Summarizer — AI Study Toolkit</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">AI Study <span>Toolkit</span></a>
  <div class="nav-links">
    <a href="summarizer.html" class="active">Summarizer</a>
    <a href="quiz.html">Quiz Generator</a>
  </div>
</nav>

<div class="tool-container">

  <div class="tool-header">
    <h1>📝 Note Summarizer</h1>
    <p>Paste your notes or any long text — get a concise summary and key takeaways instantly.</p>
  </div>

  <div class="input-section">
    <label>Your Notes</label>
    <textarea id="noteInput" placeholder="Paste your notes, article, lecture material, or any long text here..."></textarea>
    <button class="btn btn-primary" id="summarizeBtn" onclick="summarize()">
      ✦ Summarize Now
    </button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>AI is reading your notes...</span>
  </div>

  <div class="output-section" id="outputSection">

    <div class="output-card">
      <h3>Summary</h3>
      <p id="summaryText"></p>
    </div>

    <div class="output-card">
      <h3>Key Takeaways</h3>
      <ul id="keyPoints"></ul>
    </div>

  </div>

</div>

<footer>Built by Yeasin Santo &nbsp;·&nbsp; AI Study Toolkit</footer>

<script>
async function summarize() {
  const input = document.getElementById('noteInput').value.trim();
  if (!input) { alert('Please paste some notes first!'); return; }

  const btn = document.getElementById('summarizeBtn');
  const loader = document.getElementById('loader');
  const outputSection = document.getElementById('outputSection');

  btn.disabled = true;
  btn.textContent = 'Summarizing...';
  loader.classList.add('visible');
  outputSection.classList.remove('visible');

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Summarize the following text in 3-4 clear sentences. Then list exactly 5 key takeaways as short bullet points.

Return your response in this EXACT format (no extra text):
SUMMARY: [your 3-4 sentence summary here]
POINTS:
- [point 1]
- [point 2]
- [point 3]
- [point 4]
- [point 5]

Text to summarize:
${input}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text;

    const summaryMatch = text.match(/SUMMARY:\s*([\s\S]*?)(?=POINTS:)/);
    const pointsMatch = text.match(/POINTS:\s*([\s\S]*)/);

    const summary = summaryMatch ? summaryMatch[1].trim() : "Summary could not be extracted.";
    const pointsRaw = pointsMatch ? pointsMatch[1].trim() : "";
    const points = pointsRaw.split('\n').filter(p => p.trim().startsWith('-')).map(p => p.replace(/^-\s*/, '').trim());

    document.getElementById('summaryText').textContent = summary;

    const ul = document.getElementById('keyPoints');
    ul.innerHTML = '';
    points.forEach(p => {
      const li = document.createElement('li');
      li.textContent = p;
      ul.appendChild(li);
    });

    outputSection.classList.add('visible');

  } catch (err) {
    alert('Something went wrong. Please try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ Summarize Now';
    loader.classList.remove('visible');
  }
}
</script>

</body>
</html>
