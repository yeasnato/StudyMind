<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Generator — AI Study Toolkit</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">AI Study <span>Toolkit</span></a>
  <div class="nav-links">
    <a href="summarizer.html">Summarizer</a>
    <a href="quiz.html" class="active">Quiz Generator</a>
  </div>
</nav>

<div class="tool-container">

  <div class="tool-header">
    <h1>🧠 Quiz Generator</h1>
    <p>Paste your study material and get 5 multiple choice questions. Click an option to reveal the answer.</p>
  </div>

  <div class="input-section">
    <label>Study Material</label>
    <textarea id="quizInput" placeholder="Paste your study material, chapter notes, or any text you want to be quizzed on..."></textarea>
    <button class="btn btn-primary quiz" id="quizBtn" onclick="generateQuiz()">
      ✦ Generate Quiz
    </button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>AI is creating your quiz...</span>
  </div>

  <div class="output-section" id="outputSection">
    <div id="quizContainer"></div>
  </div>

</div>

<footer>Built by Yeasin Santo &nbsp;·&nbsp; AI Study Toolkit</footer>

<script>
async function generateQuiz() {
  const input = document.getElementById('quizInput').value.trim();
  if (!input) { alert('Please paste some study material first!'); return; }

  const btn = document.getElementById('quizBtn');
  const loader = document.getElementById('loader');
  const outputSection = document.getElementById('outputSection');
  const container = document.getElementById('quizContainer');

  btn.disabled = true;
  btn.textContent = 'Generating...';
  loader.classList.add('visible');
  outputSection.classList.remove('visible');
  container.innerHTML = '';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Generate exactly 5 multiple choice questions from the text below.
Return ONLY a valid JSON array. No explanation, no markdown, no backticks. Just the raw JSON.

Format:
[
  {
    "question": "Question text here?",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "answer": "Option A"
  }
]

Text:
${input}`
        }]
      })
    });

    const data = await response.json();
    let text = data.content[0].text.trim();

    // Strip any accidental markdown fences
    text = text.replace(/```json|```/g, '').trim();

    const questions = JSON.parse(text);

    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.className = 'quiz-card-item';
      card.style.animationDelay = `${i * 0.08}s`;

      const optionsHTML = q.options.map(opt => `
        <button class="option-btn" onclick="checkAnswer(this, '${escapeStr(opt)}', '${escapeStr(q.answer)}')">
          ${opt}
        </button>
      `).join('');

      card.innerHTML = `
        <div class="q-number">Q${i + 1}</div>
        <h4>${q.question}</h4>
        <div class="options">${optionsHTML}</div>
      `;
      container.appendChild(card);
    });

    outputSection.classList.add('visible');

  } catch (err) {
    alert('Something went wrong. Please try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ Generate Quiz';
    loader.classList.remove('visible');
  }
}

function checkAnswer(btn, selected, correct) {
  const allBtns = btn.closest('.options').querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (selected !== correct) btn.classList.add('wrong');
}

function escapeStr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>

</body>
</html>
